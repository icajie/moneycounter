<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Counter – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0fdf4;
      --card: #ffffff;
      --border: #d1fae5;
      --accent: #10b981;
      --accent-dark: #059669;
      --text: #111827;
      --muted: #6b7280;
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(16,185,129,0.08);
    }

    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.375rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.375rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.6875rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .error {
      font-size: 0.8125rem;
      color: var(--danger);
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    button.btn-login {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 0.625rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button.btn-login:hover { opacity: 0.92; }
    button.btn-login:active { transform: scale(0.98); }

    .hint {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    details summary {
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .hint-body {
      margin-top: 0.75rem;
    }

    .hint-body input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      margin-bottom: 0.5rem;
    }

    .hint-body input[type="text"]:focus { border-color: var(--accent); }

    .hash-out {
      font-size: 0.75rem;
      word-break: break-all;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      color: var(--muted);
      min-height: 2.5rem;
    }

    button.btn-sm {
      padding: 0.4rem 0.875rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💰</div>
    <h1>Money Counter</h1>
    <p class="subtitle">Enter your password to continue</p>

    <label for="pwd">Password</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password" />
    <p class="error" id="err"></p>

    <button class="btn-login" onclick="login()">Sign In</button>

    <div class="hint">
      <details>
        <summary>Setup / change password</summary>
        <div class="hint-body">
          <input type="text" id="newpwd" placeholder="Type new password" />
          <br/>
          <button class="btn-sm" onclick="generateHash()">Generate Hash</button>
          <div class="hash-out" id="hashOut">Hash will appear here — copy it into config.json</div>
        </div>
      </details>
    </div>
  </div>

  <script>
    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function login() {
      const pwd = document.getElementById('pwd').value.trim();
      if (!pwd) { document.getElementById('err').textContent = 'Please enter your password.'; return; }

      let config;
      try {
        const r = await fetch('/config.json');
        config = await r.json();
      } catch {
        document.getElementById('err').textContent = 'Could not load config.json.';
        return;
      }

      const hash = await sha256(pwd);
      if (hash === config.passwordHash) {
        sessionStorage.setItem('auth', hash);
        location.href = '/index.html';
      } else {
        document.getElementById('err').textContent = 'Incorrect password.';
      }
    }

    async function generateHash() {
      const pwd = document.getElementById('newpwd').value.trim();
      if (!pwd) { document.getElementById('hashOut').textContent = 'Enter a password first.'; return; }
      const hash = await sha256(pwd);
      document.getElementById('hashOut').textContent = hash;
    }
  </script>
</body>
</html>
